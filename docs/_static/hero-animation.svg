<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240"
     role="img" aria-label="A glowing pulse traces the graph and lands on a different model each run: GCN then GAT then GIN then SAGE.">
  <title>GraphNetz pipeline</title>
  <desc>Each run the particle sweeps the graph perimeter, dives into the
        hub, flows along the bridge, and lands on one model row.  The
        target rotates GCN → GAT → GIN → SAGE so successive runs visit
        different models; the active row gets a sustained highlight bar
        plus a colored label.</desc>

  <defs>
    <style>
      .gn-perim   { stroke: #22333B; stroke-width: 1; fill: none; opacity: 0.18; stroke-linecap: round; }
      .gn-spoke   { stroke: #22333B; stroke-width: 1; fill: none; opacity: 0.10; stroke-linecap: round; }
      .gn-node    { fill: #FFFFFF; stroke: #22333B; stroke-width: 1.4; }
      .gn-hub     { fill: #FFFFFF; stroke: #22333B; stroke-width: 2; }
      .gn-bridge  { stroke: #C6AC8F; stroke-width: 1.2; fill: none; opacity: 0.5; stroke-dasharray: 3 4; }
      .gn-mean    { fill: #22333B; }
      .gn-ci      { stroke: #4A90B8; stroke-width: 2; stroke-linecap: round; }
      .gn-cap     { stroke: #22333B; stroke-width: 1.4; stroke-linecap: round; }
      .gn-violin  { fill: #4A90B8; }
      .gn-axis    { stroke: #C6AC8F; stroke-width: 0.8; stroke-dasharray: 2 3; opacity: 0.55; }
      .gn-label   { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
                    font-size: 10px; fill: #22333B; opacity: 0.65; }
      .gn-row-bg  { fill: #4A90B8; opacity: 0; }

      @media (prefers-reduced-motion: reduce) {
        .gn-particle, .gn-ring, .gn-flare, .gn-row-bg { display: none; }
      }
    </style>

    <filter id="gn-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.6"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="gn-bg" cx="50%" cy="55%" r="65%">
      <stop offset="0%"   stop-color="#EAE0D5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#EAE0D5" stop-opacity="0"/>
    </radialGradient>

    <!-- Four paths: same graph + bridge prefix, ending at a different model mean. -->
    <path id="gp1" d="M 140 45 L 213 78 L 222 155 L 140 197 L 58 162 L 67 87
                      L 140 120 Q 330 50 560 48"/>
    <path id="gp2" d="M 140 45 L 213 78 L 222 155 L 140 197 L 58 162 L 67 87
                      L 140 120 Q 350 60 578 90"/>
    <path id="gp3" d="M 140 45 L 213 78 L 222 155 L 140 197 L 58 162 L 67 87
                      L 140 120 Q 330 100 545 132"/>
    <path id="gp4" d="M 140 45 L 213 78 L 222 155 L 140 197 L 58 162 L 67 87
                      L 140 120 Q 330 130 575 174"/>
  </defs>

  <rect width="720" height="240" fill="url(#gn-bg)"/>

  <!-- ============ Static graph topology ============ -->
  <g class="gn-spoke">
    <line x1="140" y1="45"  x2="140" y2="120"/>
    <line x1="213" y1="78"  x2="140" y2="120"/>
    <line x1="222" y1="155" x2="140" y2="120"/>
    <line x1="140" y1="197" x2="140" y2="120"/>
    <line x1="58"  y1="162" x2="140" y2="120"/>
    <line x1="67"  y1="87"  x2="140" y2="120"/>
  </g>
  <g class="gn-perim">
    <line x1="140" y1="45"  x2="213" y2="78"/>
    <line x1="213" y1="78"  x2="222" y2="155"/>
    <line x1="222" y1="155" x2="140" y2="197"/>
    <line x1="140" y1="197" x2="58"  y2="162"/>
    <line x1="58"  y1="162" x2="67"  y2="87"/>
  </g>
  <!-- ============ Outer nodes (flare on every run) ============ -->
  <circle class="gn-node gn-flare" cx="140" cy="45"  r="4.5">
    <animate attributeName="r" values="4.5;6.5;4.5" dur="0.35s"
             begin="m1.begin; m2.begin; m3.begin; m4.begin" restart="always"/>
  </circle>
  <circle class="gn-node gn-flare" cx="213" cy="78"  r="4.5">
    <animate attributeName="r" values="4.5;6.5;4.5" dur="0.35s"
             begin="m1.begin+0.68s; m2.begin+0.68s; m3.begin+0.68s; m4.begin+0.68s" restart="always"/>
  </circle>
  <circle class="gn-node gn-flare" cx="222" cy="155" r="4.5">
    <animate attributeName="r" values="4.5;6.5;4.5" dur="0.35s"
             begin="m1.begin+1.32s; m2.begin+1.32s; m3.begin+1.32s; m4.begin+1.32s" restart="always"/>
  </circle>
  <circle class="gn-node gn-flare" cx="140" cy="197" r="4.5">
    <animate attributeName="r" values="4.5;6.5;4.5" dur="0.35s"
             begin="m1.begin+2.08s; m2.begin+2.08s; m3.begin+2.08s; m4.begin+2.08s" restart="always"/>
  </circle>
  <circle class="gn-node gn-flare" cx="58"  cy="162" r="4.5">
    <animate attributeName="r" values="4.5;6.5;4.5" dur="0.35s"
             begin="m1.begin+2.82s; m2.begin+2.82s; m3.begin+2.82s; m4.begin+2.82s" restart="always"/>
  </circle>
  <circle class="gn-node gn-flare" cx="67"  cy="87"  r="4.5">
    <animate attributeName="r" values="4.5;6.5;4.5" dur="0.35s"
             begin="m1.begin+3.46s; m2.begin+3.46s; m3.begin+3.46s; m4.begin+3.46s" restart="always"/>
  </circle>

  <!-- ============ Hub: flare + sonar ring every run ============ -->
  <circle cx="140" cy="120" r="11" fill="#4A90B8" opacity="0.16"/>
  <circle class="gn-hub gn-flare" cx="140" cy="120" r="6.8">
    <animate attributeName="r" values="6.8;9;6.8" dur="0.5s"
             begin="m1.begin+4.12s; m2.begin+4.12s; m3.begin+4.12s; m4.begin+4.12s" restart="always"/>
  </circle>
  <circle class="gn-ring" cx="140" cy="120" r="6.8"
          fill="none" stroke="#4A90B8" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="6.8;26" dur="1.8s"
             begin="m1.begin+4.12s; m2.begin+4.12s; m3.begin+4.12s; m4.begin+4.12s" restart="always"/>
    <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.2;1" dur="1.8s"
             begin="m1.begin+4.12s; m2.begin+4.12s; m3.begin+4.12s; m4.begin+4.12s" restart="always"/>
  </circle>

  <!-- ============================================================== -->
  <!-- RIGHT  — forest plot                                            -->
  <!--   Each run highlights ONE row.  Sustained highlight bar appears -->
  <!--   when the comet arrives and stays until the next run begins.   -->
  <!-- ============================================================== -->
  <g transform="translate(440, 30)">
    <line class="gn-axis" x1="120" y1="-4" x2="120" y2="184"/>

    <!-- ===== GCN — run 1 ===== -->
    <g transform="translate(0, 18)">
      <rect class="gn-row-bg gn-flare" x="-44" y="-13" width="244" height="26" rx="4">
        <animate attributeName="opacity" values="0;0.10;0.10;0"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m1.end-0.4s" restart="always"/>
      </rect>
      <text class="gn-label" x="-8" y="4" text-anchor="end">GCN<animate
            attributeName="opacity" values="0.65;1;1;0.65"
            keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m1.end-0.4s"/><animate
            attributeName="fill" values="#22333B;#1f6f99;#1f6f99;#22333B"
            keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m1.end-0.4s"/></text>
      <path class="gn-violin gn-flare" opacity="0.10"
            d="M 80 0 Q 110 -7 120 -7 Q 130 -7 160 0 Q 130 7 120 7 Q 110 7 80 0 Z">
        <animate attributeName="opacity" values="0.10;0.45;0.45;0.10"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m1.end-0.4s" restart="always"/>
      </path>
      <line class="gn-ci"  x1="80"  y1="0" x2="160" y2="0">
        <animate attributeName="stroke-width" values="2;3;3;2"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m1.end-0.4s"/>
      </line>
      <line class="gn-cap" x1="80"  y1="-4" x2="80"  y2="4"/>
      <line class="gn-cap" x1="160" y1="-4" x2="160" y2="4"/>
      <circle class="gn-mean gn-flare" cx="120" cy="0" r="3.4" filter="url(#gn-glow)">
        <animate attributeName="r" values="3.4;6;6;3.4"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m1.end-0.4s" restart="always"/>
      </circle>
    </g>

    <!-- ===== GAT — run 2 ===== -->
    <g transform="translate(0, 60)">
      <rect class="gn-row-bg gn-flare" x="-44" y="-13" width="244" height="26" rx="4">
        <animate attributeName="opacity" values="0;0.10;0.10;0"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m2.end-0.4s" restart="always"/>
      </rect>
      <text class="gn-label" x="-8" y="4" text-anchor="end">GAT<animate
            attributeName="opacity" values="0.65;1;1;0.65"
            keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m2.end-0.4s"/><animate
            attributeName="fill" values="#22333B;#1f6f99;#1f6f99;#22333B"
            keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m2.end-0.4s"/></text>
      <path class="gn-violin gn-flare" opacity="0.10"
            d="M 90 0 Q 125 -8 138 -8 Q 151 -8 195 0 Q 151 8 138 8 Q 125 8 90 0 Z">
        <animate attributeName="opacity" values="0.10;0.45;0.45;0.10"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m2.end-0.4s" restart="always"/>
      </path>
      <line class="gn-ci"  x1="90"  y1="0" x2="195" y2="0">
        <animate attributeName="stroke-width" values="2;3;3;2"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m2.end-0.4s"/>
      </line>
      <line class="gn-cap" x1="90"  y1="-4" x2="90"  y2="4"/>
      <line class="gn-cap" x1="195" y1="-4" x2="195" y2="4"/>
      <circle class="gn-mean gn-flare" cx="138" cy="0" r="3.4" filter="url(#gn-glow)">
        <animate attributeName="r" values="3.4;6;6;3.4"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m2.end-0.4s" restart="always"/>
      </circle>
    </g>

    <!-- ===== GIN — run 3 ===== -->
    <g transform="translate(0, 102)">
      <rect class="gn-row-bg gn-flare" x="-44" y="-13" width="244" height="26" rx="4">
        <animate attributeName="opacity" values="0;0.10;0.10;0"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m3.end-0.4s" restart="always"/>
      </rect>
      <text class="gn-label" x="-8" y="4" text-anchor="end">GIN<animate
            attributeName="opacity" values="0.65;1;1;0.65"
            keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m3.end-0.4s"/><animate
            attributeName="fill" values="#22333B;#1f6f99;#1f6f99;#22333B"
            keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m3.end-0.4s"/></text>
      <path class="gn-violin gn-flare" opacity="0.10"
            d="M 60 0 Q 92 -7 105 -7 Q 118 -7 152 0 Q 118 7 105 7 Q 92 7 60 0 Z">
        <animate attributeName="opacity" values="0.10;0.45;0.45;0.10"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m3.end-0.4s" restart="always"/>
      </path>
      <line class="gn-ci"  x1="60"  y1="0" x2="152" y2="0">
        <animate attributeName="stroke-width" values="2;3;3;2"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m3.end-0.4s"/>
      </line>
      <line class="gn-cap" x1="60"  y1="-4" x2="60"  y2="4"/>
      <line class="gn-cap" x1="152" y1="-4" x2="152" y2="4"/>
      <circle class="gn-mean gn-flare" cx="105" cy="0" r="3.4" filter="url(#gn-glow)">
        <animate attributeName="r" values="3.4;6;6;3.4"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m3.end-0.4s" restart="always"/>
      </circle>
    </g>

    <!-- ===== SAGE — run 4 ===== -->
    <g transform="translate(0, 144)">
      <rect class="gn-row-bg gn-flare" x="-44" y="-13" width="244" height="26" rx="4">
        <animate attributeName="opacity" values="0;0.10;0.10;0"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m4.end-0.4s" restart="always"/>
      </rect>
      <text class="gn-label" x="-8" y="4" text-anchor="end">SAGE<animate
            attributeName="opacity" values="0.65;1;1;0.65"
            keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m4.end-0.4s"/><animate
            attributeName="fill" values="#22333B;#1f6f99;#1f6f99;#22333B"
            keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m4.end-0.4s"/></text>
      <path class="gn-violin gn-flare" opacity="0.10"
            d="M 95 0 Q 122 -8 135 -8 Q 148 -8 185 0 Q 148 8 135 8 Q 122 8 95 0 Z">
        <animate attributeName="opacity" values="0.10;0.45;0.45;0.10"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m4.end-0.4s" restart="always"/>
      </path>
      <line class="gn-ci"  x1="95"  y1="0" x2="185" y2="0">
        <animate attributeName="stroke-width" values="2;3;3;2"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m4.end-0.4s"/>
      </line>
      <line class="gn-cap" x1="95"  y1="-4" x2="95"  y2="4"/>
      <line class="gn-cap" x1="185" y1="-4" x2="185" y2="4"/>
      <circle class="gn-mean gn-flare" cx="135" cy="0" r="3.4" filter="url(#gn-glow)">
        <animate attributeName="r" values="3.4;6;6;3.4"
                 keyTimes="0;0.18;0.95;1" dur="8.4s" begin="m4.end-0.4s" restart="always"/>
      </circle>
    </g>
  </g>

  <!-- ============================================================== -->
  <!-- THE COMET                                                       -->
  <!--   m1 → m2 → m3 → m4 → loop.  Each motion: 8 seconds, 0.4s gap.  -->
  <!--   Each ends at a different model row.                           -->
  <!-- ============================================================== -->
  <polygon class="gn-particle" points="-3,-3 5,0 -3,3 -1,0" fill="#8B5E3C" opacity="0" filter="url(#gn-glow)">
    <animateMotion id="m1" dur="8s" begin="0.4s; m4.end+0.4s" calcMode="paced" rotate="auto" restart="always">
      <mpath href="#gp1"/>
    </animateMotion>
    <animateMotion id="m2" dur="8s" begin="m1.end+0.4s" calcMode="paced" rotate="auto" restart="always">
      <mpath href="#gp2"/>
    </animateMotion>
    <animateMotion id="m3" dur="8s" begin="m2.end+0.4s" calcMode="paced" rotate="auto" restart="always">
      <mpath href="#gp3"/>
    </animateMotion>
    <animateMotion id="m4" dur="8s" begin="m3.end+0.4s" calcMode="paced" rotate="auto" restart="always">
      <mpath href="#gp4"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.96;1" dur="8s" begin="m1.begin"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.96;1" dur="8s" begin="m2.begin"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.96;1" dur="8s" begin="m3.begin"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.96;1" dur="8s" begin="m4.begin"/>
  </polygon>

  <!-- comet trail (slightly behind, smaller, dimmer) -->
  <circle class="gn-particle" r="2.4" fill="#8B5E3C" opacity="0" filter="url(#gn-glow)">
    <animateMotion dur="8s" begin="m1.begin+0.20s" calcMode="paced" rotate="auto">
      <mpath href="#gp1"/>
    </animateMotion>
    <animateMotion dur="8s" begin="m2.begin+0.20s" calcMode="paced" rotate="auto">
      <mpath href="#gp2"/>
    </animateMotion>
    <animateMotion dur="8s" begin="m3.begin+0.20s" calcMode="paced" rotate="auto">
      <mpath href="#gp3"/>
    </animateMotion>
    <animateMotion dur="8s" begin="m4.begin+0.20s" calcMode="paced" rotate="auto">
      <mpath href="#gp4"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.04;0.96;1" dur="8s" begin="m1.begin+0.20s"/>
    <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.04;0.96;1" dur="8s" begin="m2.begin+0.20s"/>
    <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.04;0.96;1" dur="8s" begin="m3.begin+0.20s"/>
    <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.04;0.96;1" dur="8s" begin="m4.begin+0.20s"/>
  </circle>
</svg>
