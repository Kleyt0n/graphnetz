<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-label="GraphNetz logo">
  <title>GraphNetz</title>
  <!--
    Minimal graph mark: 6 outer nodes on a regular hexagon plus a single
    central anchor.  The 3 long diagonals through the centre and the
    hexagonal perimeter form a symmetric K_4-flavoured network.  Single
    colour (NATURE_COLORS jet-black, #22333B) so the mark reads cleanly
    in both light and dark contexts.
  -->
  <g stroke="#22333B" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 3 diagonals through the centre -->
    <line x1="110" y1="35"   x2="110" y2="185"/>
    <line x1="45"  y1="72.5" x2="175" y2="147.5"/>
    <line x1="45"  y1="147.5" x2="175" y2="72.5"/>
    <!-- hexagon perimeter -->
    <polygon points="110,35 175,72.5 175,147.5 110,185 45,147.5 45,72.5"/>
  </g>
  <g fill="#22333B">
    <circle cx="110" cy="35"    r="7.2"/>
    <circle cx="175" cy="72.5"  r="7.2"/>
    <circle cx="175" cy="147.5" r="7.2"/>
    <circle cx="110" cy="185"   r="7.2"/>
    <circle cx="45"  cy="147.5" r="7.2"/>
    <circle cx="45"  cy="72.5"  r="7.2"/>
  </g>
  <!-- central anchor: white-cored ring so it reads as a distinct hub -->
  <circle cx="110" cy="110" r="9.5" fill="#FFFFFF" stroke="#22333B" stroke-width="2.5"/>
</svg>
